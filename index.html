<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <!-- PWA / iOS home screen -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Lightning Log" />
  <meta name="theme-color" content="#0a0e1a" />
  <meta name="mobile-web-app-capable" content="yes" />

  <title>Lightning Log</title>

  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230a0e1a'/%3E%3Ctext x='90' y='125' font-size='100' text-anchor='middle'%3E%E2%9A%A1%3C/text%3E%3C/svg%3E" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');

    :root {
      --bg:       #0a0e1a;
      --surface:  #111827;
      --surface2: #0d1424;
      --border:   #1e2d50;
      --text:     #e8eaf0;
      --muted:    #5a7ab0;
      --dim:      #3a5080;
      --cyan:     #00e5ff;
      --teal:     #00c9a7;
      --amber:    #f0b429;
      --orange:   #f97316;
      --blue:     #38bdf8;
      --violet:   #a78bfa;
      --red:      #ef4444;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', -apple-system, sans-serif;
      overscroll-behavior: none;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 430px;
      margin: 0 auto;
      position: relative;
    }

    /* ── Header ─────────────────────────────────────────── */
    #header {
      background: linear-gradient(135deg, #0d1629 0%, #1a2440 100%);
      padding: calc(var(--safe-top) + 16px) 20px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-bolt { font-size: 30px; line-height: 1; flex-shrink: 0; }
    .header-title { font-size: 21px; font-weight: 700; letter-spacing: -0.5px; }
    .header-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .header-back {
      background: none; border: none; color: var(--cyan); font-family: inherit;
      font-size: 14px; font-weight: 700; cursor: pointer; padding: 4px 0;
      display: flex; align-items: center; gap: 4px; flex-shrink: 0;
    }
    .print-timestamp { display: none; }

    /* ── Body ───────────────────────────────────────────── */
    #body {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px 16px 8px;
    }

    /* ── Nav ────────────────────────────────────────────── */
    #nav {
      display: flex;
      gap: 8px;
      background: #0d1424;
      border-top: 1px solid var(--border);
      padding: 10px 12px;
      padding-bottom: calc(10px + var(--safe-bot));
      flex-shrink: 0;
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 11px 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      cursor: pointer;
      color: var(--muted);
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      font-family: inherit;
    }
    .nav-btn:active { transform: scale(0.97); }
    .nav-btn.active {
      background: var(--cyan);
      color: #0a0e1a;
      border-color: var(--cyan);
      opacity: 1;
    }
    .nav-btn:disabled:not(.active) { opacity: 0.4; cursor: default; }
    .nav-icon { font-size: 16px; line-height: 1; }
    .nav-label { font-size: 11px; font-weight: 700; letter-spacing: 0.3px; text-transform: uppercase; white-space: nowrap; }

    /* ── Shared ─────────────────────────────────────────── */
    .section-head {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      margin-top: 4px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .section-head-action {
      background: none; border: none; color: var(--cyan); font-family: inherit;
      font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
      cursor: pointer; padding: 0;
    }

    /* ── Stats grid ─────────────────────────────────────── */
    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--surface);
      border-radius: 12px;
      padding: 14px 14px 12px;
      border-top: 3px solid var(--cyan);
    }
    .stat-val {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1.1;
    }
    .stat-unit { font-size: 12px; font-weight: 400; margin-left: 3px; opacity: 0.65; }
    .stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; font-weight: 500; letter-spacing: 0.3px; }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 14px;
      margin-bottom: 16px;
      font-size: 10px;
      color: var(--muted);
    }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
    .footnote { text-align: center; font-size: 11px; color: var(--dim); padding-bottom: 4px; }
    .rev-tag { text-align: center; font-size: 9px; color: var(--dim); opacity: 0.5; letter-spacing: 0.5px; margin-top: 24px; padding-bottom: 8px; }

    /* ── Trip cards (list view) ─────────────────────────── */
    .trip-card {
      background: var(--surface);
      border-radius: 12px;
      margin-bottom: 10px;
      border: 1px solid var(--border);
      padding: 14px;
      cursor: pointer;
      position: relative;
    }
    .trip-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
    .trip-name { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
    .trip-date { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .trip-route { font-size: 12px; color: var(--muted); margin-top: 6px; line-height: 1.5; }
    .trip-route b { color: var(--text); font-weight: 600; }
    .trip-mini-stats { display: flex; gap: 14px; margin-top: 10px; }
    .trip-mini-stat { font-size: 12px; }
    .trip-mini-val { font-weight: 700; font-size: 14px; }
    .trip-mini-label { color: var(--dim); font-size: 10px; text-transform: uppercase; letter-spacing: 0.4px; }
    .trip-stop-count {
      font-size: 10px; font-weight: 700; color: #0a0e1a; background: var(--cyan);
      border-radius: 20px; padding: 3px 9px; flex-shrink: 0;
    }

    /* ── Stop cards (detail view) ───────────────────────── */
    .stop-card {
      background: var(--surface);
      border-radius: 12px;
      margin-bottom: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
      cursor: pointer;
    }
    .stop-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 14px;
    }
    .stop-badge {
      font-size: 11px;
      font-weight: 700;
      color: #0a0e1a;
      padding: 3px 8px;
      border-radius: 20px;
      min-width: 30px;
      text-align: center;
      flex-shrink: 0;
    }
    .stop-main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .stop-loc { font-size: 15px; font-weight: 700; letter-spacing: -0.2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .stop-sub { font-size: 12px; color: var(--amber); font-weight: 600; margin-top: 2px; }
    .stop-meta { font-size: 11px; color: var(--muted); text-align: right; flex-shrink: 0; }
    .chevron { font-size: 14px; color: var(--dim); margin-left: 4px; transition: transform 0.2s; display: inline-block; flex-shrink: 0; }
    .chevron.open { transform: rotate(180deg); }

    .stop-detail {
      padding: 0 14px 14px;
      border-top: 1px solid #1a2440;
      display: none;
    }
    .stop-detail.open { display: block; }
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
      margin-bottom: 12px;
    }
    .detail-item {
      background: var(--surface2);
      border-radius: 8px;
      padding: 8px 6px;
      text-align: center;
    }
    .detail-key { font-size: 9px; color: var(--dim); margin-bottom: 3px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
    .detail-val { font-size: 14px; font-weight: 700; color: var(--text); }
    .delete-btn {
      width: 100%;
      padding: 10px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      color: var(--red);
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .stop-actions { display: flex; gap: 8px; }
    .stop-actions .delete-btn, .stop-actions .edit-btn { flex: 1; }
    .edit-btn {
      padding: 10px;
      background: rgba(0,229,255,0.1);
      border: 1px solid rgba(0,229,255,0.3);
      border-radius: 8px;
      color: var(--cyan);
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    /* Start marker card */
    .start-card {
      background: linear-gradient(135deg, #0d1629, #15203a);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .start-icon { font-size: 22px; }
    /* Solid green flag: hide the checkered emoji glyph, draw a flag shape via CSS */
    .green-flag {
      display: inline-block;
      width: 0; height: 0;
      color: transparent;
      position: relative;
      vertical-align: middle;
      margin-right: 14px;
    }
    .green-flag::before {
      content: "";
      position: absolute;
      left: 0; top: -8px;
      width: 13px; height: 10px;
      background: #22c55e;
      border-radius: 1px;
    }
    .green-flag::after {
      content: "";
      position: absolute;
      left: 0; top: -8px;
      width: 1.5px; height: 17px;
      background: #166534;
    }
    .start-loc { font-size: 15px; font-weight: 700; }
    .start-soc { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .empty {
      text-align: center;
      color: var(--dim);
      margin-top: 60px;
      font-size: 15px;
      line-height: 1.8;
    }

    /* ── Forms ──────────────────────────────────────────── */
    .field-wrap { margin-bottom: 18px; }
    .field-label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 7px;
    }
    .input-row { display: flex; align-items: stretch; }
    .field-input, .field-text {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 17px;
      padding: 13px 14px;
      outline: none;
      font-family: inherit;
      -webkit-appearance: none;
    }
    .field-input { border-right: none; border-radius: 10px 0 0 10px; }
    .field-text { border-radius: 10px; width: 100%; }
    .field-input:focus, .field-text:focus { border-color: var(--cyan); box-shadow: 0 0 0 2px rgba(0,229,255,0.15); }
    .loc-row { display: flex; gap: 8px; align-items: stretch; }
    .loc-btn {
      flex-shrink: 0;
      width: 52px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 20px;
      cursor: pointer;
      color: var(--cyan);
      transition: background 0.15s;
      -webkit-appearance: none;
    }
    .loc-btn:active { background: #1a2440; }
    .loc-btn:disabled { opacity: 0.5; cursor: default; }
    .loc-status { font-size: 11px; color: var(--muted); margin-top: 6px; min-height: 14px; }
    .loc-status.error { color: var(--amber); }

    .field-unit {
      background: #1a2440;
      border: 1px solid var(--border);
      border-left: none;
      border-radius: 0 10px 10px 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      padding: 13px 11px;
      min-width: 40px;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .add-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #0070f3, #00c9a7);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: inherit;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: -0.3px;
      margin-top: 8px;
      -webkit-appearance: none;
    }
    .add-btn:active { opacity: 0.85; }
    .hint-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 18px;
      line-height: 1.5;
    }
    .hint-box b { color: var(--text); }

    /* ── Home charge box ──────────────────────────────── */
    .home-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 16px;
    }
    .home-box-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }
    .home-box-row .field-wrap { flex: 1; margin-bottom: 0; }
    .home-result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }
    .home-result-item {
      background: var(--surface2);
      border-radius: 8px;
      padding: 10px 6px;
      text-align: center;
    }
    .home-result-val { font-size: 16px; font-weight: 700; }
    .home-result-label { font-size: 9px; color: var(--dim); margin-top: 3px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
    .home-note { font-size: 11px; color: var(--muted); margin-top: 10px; line-height: 1.5; }


    /* ── Leg type toggle ─────────────────────────────────── */
    .leg-toggle {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 18px;
    }
    .leg-toggle-btn {
      flex: 1;
      padding: 10px 4px;
      background: none;
      border: none;
      color: var(--muted);
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      line-height: 1.3;
    }
    .leg-toggle-btn.active {
      background: var(--cyan);
      color: #0a0e1a;
    }
    .leg-toggle-btn:not(:last-child) {
      border-right: 1px solid var(--border);
    }

    /* ── AC/DC toggle ────────────────────────────────────── */
    .ac-dc-toggle {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .ac-dc-btn {
      flex: 1;
      padding: 12px 4px;
      background: none;
      border: none;
      color: var(--muted);
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }
    .ac-dc-btn.active[data-power="dc"] { background: var(--cyan); color: #0a0e1a; }
    .ac-dc-btn.active[data-power="ac"] { background: var(--teal); color: #0a0e1a; }
    .ac-dc-btn:not(:last-child) { border-right: 1px solid var(--border); }

    /* Small AC/DC badge shown on stop cards */
    .power-badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.4px;
      padding: 1px 5px;
      border-radius: 4px;
      margin-left: 6px;
      vertical-align: middle;
    }
    .power-badge.dc { background: rgba(0,229,255,0.18); color: var(--cyan); }
    .power-badge.ac { background: rgba(0,201,167,0.18); color: var(--teal); }

    /* ── DC/AC/Combined summary tabs ─────────────────────── */
    .power-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
    }
    .power-tab {
      flex: 1;
      padding: 8px 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
    }
    .power-tab.active { background: var(--cyan); color: #0a0e1a; border-color: var(--cyan); }
    .power-tab[data-filter="ac"].active { background: var(--teal); border-color: var(--teal); }
    .stat-empty { text-align: center; color: var(--dim); font-size: 13px; padding: 24px 0; line-height: 1.6; }

    /* ── Toast ──────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: calc(var(--safe-bot) + 80px);
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--teal);
      color: #0a0e1a;
      padding: 10px 22px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 700;
      z-index: 999;
      box-shadow: 0 4px 20px rgba(0,201,167,0.4);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Views ──────────────────────────────────────────── */
    .view { display: none; }
    .view.active { display: block; }

    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

    /* ── Print styles ───────────────────────────────────── */
    @media print {
      @page { size: letter portrait; margin: 0.4in; }
      html, body { width: 100%; height: auto !important; background: #fff !important; }
      body { background: #fff !important; color: #000 !important; font-size: 10px !important; }
      #app, #body, .view { background: #fff !important; }
      #app { max-width: 100% !important; height: auto !important; min-height: 0 !important; display: block !important; }
      #nav, #toast, .delete-btn { display: none !important; }
      #header { background: none !important; border-bottom: 1.5px solid #000 !important; padding: 0 0 6px !important; }
      .header-title { color: #000 !important; font-size: 15px !important; }
      .header-sub { color: #444 !important; font-size: 9px !important; }
      .header-bolt, .header-back { display: none; }
      #body { padding: 6px 0 0 !important; overflow: visible !important; height: auto !important; }
      .view { display: block !important; }

      /* Summary: single compact row of 8 */
      .stat-grid { grid-template-columns: repeat(8, 1fr) !important; gap: 4px !important; margin-bottom: 8px !important; }
      .stat-card { background: #f5f5f5 !important; border-radius: 4px !important; border-top-width: 2px !important; padding: 4px 3px !important; }
      .stat-val { font-size: 11px !important; }
      .stat-unit { font-size: 7px !important; }
      .stat-label { font-size: 7px !important; margin-top: 1px !important; }

      .legend, .footnote { display: none !important; }
      .section-head { color: #000 !important; border-bottom: 1px solid #ccc; padding-bottom: 2px; margin: 0 0 5px !important; font-size: 9px !important; }
      .section-head-action { display: none !important; }

      /* Route: two columns of stop cards to save vertical space */
      #trip-route { columns: 2; column-gap: 8px; }
      .trip-card, .stop-card, .start-card {
        background: #fff !important; border: 1px solid #ccc !important; border-radius: 4px !important;
        margin: 0 0 5px !important; break-inside: avoid; -webkit-column-break-inside: avoid;
      }
      .start-card { background: #f5f5f5 !important; padding: 6px 8px !important; }
      .start-icon { font-size: 14px !important; }
      .start-loc { font-size: 11px !important; }
      .stop-row { padding: 5px 7px !important; gap: 6px !important; }
      .stop-badge { padding: 2px 5px !important; min-width: 20px !important; font-size: 9px !important; }
      .stop-loc { color: #000 !important; font-size: 11px !important; }
      .stop-sub, .stop-meta, .trip-date, .trip-route, .start-soc { color: #555 !important; font-size: 9px !important; }
      .stop-sub { font-size: 9px !important; }
      .chevron { display: none !important; }
      .stop-detail { display: block !important; padding: 0 7px 6px !important; border-top: 1px solid #eee !important; }
      .detail-grid { gap: 3px !important; margin: 6px 0 !important; }
      .detail-item { background: #f5f5f5 !important; border-radius: 3px !important; padding: 3px 2px !important; }
      .detail-key { color: #555 !important; font-size: 7px !important; margin-bottom: 1px !important; }
      .detail-val { font-size: 9px !important; color: #000 !important; }

      #view-trips, #view-add-stop, #view-new-trip { display: none !important; }
      .print-timestamp { display: block !important; font-size: 8px; color: #888; text-align: right; margin-bottom: 4px; }
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div id="header">
    <button class="header-back" id="header-back" style="display:none">‹ Trips</button>
    <div class="header-bolt" id="header-bolt">⚡</div>
    <div>
      <div class="header-title" id="header-title">Lightning Log</div>

  <!-- Body -->
  <div id="body">

    <!-- Trip List -->

    <!-- Add Stop Form -->

      <!-- Standard charging-stop fields -->
      <div id="standard-fields">
        <div class="field-wrap">
          <label class="field-label">Location</label>
          <div class="loc-row">
            <input class="field-text" type="text" placeholder="e.g. IONNA - Hagerstown, MD" id="s-loc" />
            <button type="button" class="loc-btn" id="loc-btn" title="Use my location">📍</button>
          </div>
          <div class="loc-status" id="loc-status"></div>
        </div>
        <div class="field-wrap">
          <label class="field-label">Charger Type</label>
          <div class="ac-dc-toggle" id="ac-dc-toggle">
            <button type="button" class="ac-dc-btn active" data-power="dc">⚡ DC Fast</button>
            <button type="button" class="ac-dc-btn" data-power="ac">🔌 AC Level 2</button>
          </div>
        </div>
        <div class="field-wrap">
          <label class="field-label">Battery on Arrival</label>
          <div class="input-row">
            <input class="field-input" type="number" inputmode="decimal" placeholder="e.g. 22" id="s-batt-arrive" />
            <div class="field-unit">%</div>

        <div class="field-wrap">
          <label class="field-label" id="s-miles-field-label">Miles Since Last Stop</label>

        <div class="field-wrap">
          <label class="field-label">Time on Charger</label>

        <div class="field-wrap">
          <label class="field-label">kWh Delivered</label>
          <div class="input-row">
            <input class="field-input" type="number" inputmode="decimal" placeholder="e.g. 45.2" id="s-kwh" />
            <div class="field-unit">kWh</div>
          </div>
        </div>
        <div class="field-wrap">
          <label class="field-label">Battery on Departure</label>
          <div class="input-row">
            <input class="field-input" type="number" inputmode="decimal" placeholder="e.g. 80" id="s-batt-depart" />

          </div>
        </div>
        <div class="field-wrap">
          <label class="field-label">Total Cost</label>
          <div class="input-row">
            <input class="field-input" type="number" inputmode="decimal" placeholder="e.g. 18.50" id="s-cost" />
            <div class="field-unit">$</div>

        </div>
      </div>

      <!-- Home-charge fields (shown only in Home Charge mode) -->
      <div id="home-fields" style="display:none">

          <label class="field-label">Battery at Start</label>
          <div class="input-row">
            <input class="field-input" type="number" inputmode="decimal" placeholder="e.g. 23" id="h-batt-start" />
            <div class="field-unit">%</div>
          </div>
        </div>
        <div class="field-wrap">
          <label class="field-label">Charge to (Target)</label>
          <div class="input-row">
            <input class="field-input" type="number" inputmode="decimal" placeholder="e.g. 80" id="h-batt-target" />
            <div class="field-unit">%</div>
          </div>
        </div>
        <div class="field-wrap">
          <label class="field-label">Miles to Destination <span style="color:var(--dim);font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
          <div class="input-row">
            <input class="field-input" type="number" inputmode="decimal" placeholder="e.g. 45" id="h-miles" />
            <div class="field-unit">mi</div>
          </div>
        </div>
        <div class="field-wrap">
          <label class="field-label">Home Rate <span style="color:var(--dim);font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
          <div class="input-row">
            <input class="field-input" type="number" inputmode="decimal" placeholder="e.g. 0.12" id="h-rate" />
            <div class="field-unit">$/kWh</div>
          </div>
        </div>
        <div class="field-wrap">
          <label class="field-label">L2 Charger <span style="color:var(--dim);font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
          <div class="input-row">
            <input class="field-input" type="number" inputmode="decimal" placeholder="e.g. 11.5" id="h-charger-kw" />
            <div class="field-unit">kW</div>
          </div>

        <div id="home-preview"></div>
      </div>

      <button class="add-btn" id="add-stop-btn">⚡ Add Charging Stop</button>
    </div>

  </div>

  <!-- Nav -->
  <div id="nav">
    <button class="nav-btn active" data-view="trips">
      <span class="nav-icon">🗺</span>
      <span class="nav-label">Trips</span>
    </button>
    <button class="nav-btn" data-view="primary" id="nav-primary">
      <span class="nav-icon" id="nav-primary-icon">＋</span>
      <span class="nav-label" id="nav-primary-label">New Trip</span>
    </button>
    <button class="nav-btn" id="print-nav-btn">
      <span class="nav-icon">📤</span>
      <span class="nav-label">Share</span>
    </button>
  </div>

  <div id="toast"></div>
</div>

<script>
// ── Constants ───────────────────────────────────────────────────────────────
const STORAGE_KEY = 'lightning-log-trips';
const SCHEMA_VERSION = 2;
const APP_REVISION = 'rev 19';
const MILES_PER_KWH = 2.4231;
const BATTERY_CAPACITY_KWH = 98;

// ── Default seed data (from original spreadsheet) ─────────────────────────────
const DEFAULT_TRIPS = [
  {
    id: 1,
    name: 'Ocean City Run',
    date: '',
    startLocation: 'Home - Cayuga, NY',
    startSoc: 100,
    stops: [
      { id:1, location:'Stop 1', battArrive:null, miles:null, minutes:7,  kwh:20.9, battDepart:null, cost:8.12  },
      { id:2, location:'Stop 2', battArrive:null, miles:null, minutes:23, kwh:41.7, battDepart:null, cost:16.22 },
      { id:3, location:'Stop 3', battArrive:null, miles:null, minutes:27, kwh:54.8, battDepart:null, cost:23.05 },
      { id:4, location:'Stop 4', battArrive:null, miles:null, minutes:20, kwh:41.5, battDepart:null, cost:17.01 },
      { id:5, location:'Stop 5', battArrive:null, miles:null, minutes:29, kwh:49.5, battDepart:null, cost:20.81 },
      { id:6, location:'Stop 6', battArrive:null, miles:null, minutes:20, kwh:35.4, battDepart:null, cost:14.52 },
      { id:7, location:'Stop 7', battArrive:null, miles:null, minutes:34, kwh:55.1, battDepart:null, cost:21.46 },
      { id:8, location:'Stop 8', battArrive:null, miles:null, minutes:0,  kwh:75,   battDepart:null, cost:15.0  },
    ],
  },
];

// ── Storage (versioned + migrated) ────────────────────────────────────────────
// Stored shape: { version: N, trips: [...] }. Older/legacy payloads (a bare
// array) are detected and upgraded so schema changes never corrupt saved data.
function normalizeStop(s, i) {
  return {
    id: s.id != null ? s.id : i + 1,
    location: s.location != null ? s.location : `Stop ${i + 1}`,
    battArrive: s.battArrive != null && !isNaN(s.battArrive) ? s.battArrive : null,
    miles: s.miles != null && !isNaN(s.miles) ? s.miles : null,
    minutes: Number(s.minutes) || 0,
    kwh: Number(s.kwh) || 0,
    battDepart: s.battDepart != null && !isNaN(s.battDepart) ? s.battDepart : null,
    cost: Number(s.cost) || 0,
    isHomeCharge: !!s.isHomeCharge,
    isLastLeg: !!s.isLastLeg,
    // AC vs DC. Legacy stops default: destination charge = AC (Level 2), road = DC.
    power: (s.power === 'ac' || s.power === 'dc') ? s.power : (s.isHomeCharge ? 'ac' : 'dc'),
    homeRate: s.homeRate != null && !isNaN(s.homeRate) ? s.homeRate : null,
    chargerKw: s.chargerKw != null && !isNaN(s.chargerKw) ? s.chargerKw : null,
  };
}

function normalizeTrip(t, i) {
  return {
    id: t.id != null ? t.id : i + 1,
    name: t.name || 'Untitled Trip',
    date: t.date || '',
    startLocation: t.startLocation || 'Start',
    startSoc: t.startSoc != null && !isNaN(t.startSoc) ? t.startSoc : null,
    stops: Array.isArray(t.stops) ? t.stops.map(normalizeStop) : [],
    homeCharge: t.homeCharge || null,
  };
}

function migrate(payload) {
  // Bare array = pre-versioning format → wrap it
  let raw = Array.isArray(payload) ? { version: 1, trips: payload } : payload;
  if (!raw || !Array.isArray(raw.trips)) return DEFAULT_TRIPS.map(normalizeTrip);
  // (future migrations would branch on raw.version here)
  return raw.trips.map(normalizeTrip);
}

function loadTrips() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return DEFAULT_TRIPS.map(normalizeTrip);
    return migrate(JSON.parse(raw));
  } catch {
    return DEFAULT_TRIPS.map(normalizeTrip);
  }
}

function saveTrips() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ version: SCHEMA_VERSION, trips }));
  } catch {}
}

let trips = loadTrips();
let currentTripId = trips.length ? trips[0].id : null;
let expandedStopId = null;
let currentView = 'trips';

// ── Helpers ───────────────────────────────────────────────────────────────────
const f2 = n => n.toFixed(2);
const f1 = n => n.toFixed(1);
const f0 = n => Math.round(n).toString();
const fc = n => '$' + n.toFixed(2);

function speedColor(kw) {
  if (kw >= 120) return '#00e5ff';
  if (kw >= 80)  return '#00c9a7';
  if (kw >= 50)  return '#f0b429';
  return '#ff6b6b';
}

function getTrip(id) {
  return trips.find(t => t.id === id) || null;
}

// Clamp a parsed value to a range; returns null if not a finite number.
function clampPct(v) {
  if (v == null || isNaN(v)) return null;
  return Math.min(100, Math.max(0, v));
}

// Effective miles for a stop: actual if entered, else estimate from kWh
function stopMiles(stop) {
  return (stop.miles != null && !isNaN(stop.miles)) ? stop.miles : stop.kwh * MILES_PER_KWH;
}

// SOC departing the leg leading into this stop (= battDepart of previous stop,
// or trip.startSoc if this is the first stop)
function priorSoc(trip, index) {
  if (index === 0) return trip.startSoc;
  return trip.stops[index - 1].battDepart;
}

// Trip energy consumed driving INTO this stop, derived from battery % drop
// (priorSoc -> this stop's battArrive) x pack capacity.
function legEnergyKwh(trip, index) {
  const stop = trip.stops[index];
  const prevSoc = priorSoc(trip, index);
  if (stop.battArrive == null || prevSoc == null) return null;
  const drop = prevSoc - stop.battArrive;
  if (drop <= 0) return null;
  return (drop / 100) * BATTERY_CAPACITY_KWH;
}

function stopStats(trip, index) {
  const stop = trip.stops[index];
  const miles = stopMiles(stop);
  const hasMiles = miles > 0;
  const legKwh = legEnergyKwh(trip, index);
  const useLegKwh = legKwh != null && legKwh > 0;
  const efficiencyKwh = useLegKwh ? legKwh : stop.kwh;
  return {
    speed:       stop.minutes > 0 ? (stop.kwh / stop.minutes) * 60 : 0,
    cpm:         stop.minutes > 0 ? stop.cost / stop.minutes : 0,
    cpk:         stop.kwh > 0 ? stop.cost / stop.kwh : 0,
    miPkwh:      hasMiles && efficiencyKwh > 0 ? miles / efficiencyKwh : null,
    whPmi:       hasMiles ? (efficiencyKwh * 1000) / miles : null,
    isEstMi:     stop.miles == null,
    legKwh,
    usedLegKwh:  useLegKwh,
    miles,
  };
}

// Compute a full stat set. `filter` can be 'dc', 'ac', or null (combined).
// Efficiency (mi/kWh, Wh/mi) always uses full-trip leg context, but is scoped
// to the stops in the current filter.
function tripStats(trip, filter) {
  const inSet = (s) => !filter || s.power === filter;
  const stops = trip.stops.filter(inSet);

  const totalMin   = stops.reduce((a, s) => a + s.minutes, 0);
  const totalKwh   = stops.reduce((a, s) => a + s.kwh, 0);
  // Destination charge COST is excluded from spend totals; its kWh/miles count.
  const totalCost  = stops.reduce((a, s) => a + (s.isHomeCharge ? 0 : s.cost), 0);
  const totalMiles = stops.reduce((a, s) => a + stopMiles(s), 0);

  // Avg charging speed excludes the destination Level 2 top-off (slow rate skews it).
  const fastStops = stops.filter(s => !s.isHomeCharge);
  const fastMin = fastStops.reduce((a, s) => a + s.minutes, 0);
  const fastKwh = fastStops.reduce((a, s) => a + s.kwh, 0);

  let totalEffKwh = 0;
  let totalEffMiles = 0;
  trip.stops.forEach((s, i) => {
    if (!inSet(s)) return;
    const ss = stopStats(trip, i);
    if (ss.miles > 0) {
      totalEffKwh += ss.usedLegKwh ? ss.legKwh : s.kwh;
      totalEffMiles += ss.miles;
    }
  });

  return {
    stopCount:   stops.length,
    totalMin, totalKwh, totalCost, totalMiles,
    avgSpeed:    fastMin    > 0 ? (fastKwh / fastMin) * 60 : 0,
    costPerKwh:  totalKwh   > 0 ? totalCost / totalKwh : 0,
    costPerMin:  totalMin   > 0 ? totalCost / totalMin : 0,
    costPerMile: totalMiles > 0 ? totalCost / totalMiles : 0,
    avgMiPkwh:   totalEffKwh   > 0 && totalEffMiles > 0 ? totalEffMiles / totalEffKwh : 0,
    avgWhPmi:    totalEffMiles > 0 ? (totalEffKwh * 1000) / totalEffMiles : 0,
  };
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── Header ────────────────────────────────────────────────────────────────────
function formatDate(dateStr) {
  if (!dateStr) return '';
  const [y, m, d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function updateHeader() {
  const back = document.getElementById('header-back');
  const bolt = document.getElementById('header-bolt');
  const title = document.getElementById('header-title');
  const sub = document.getElementById('header-sub');

  if (currentView === 'trips') {
    back.style.display = 'none';
    bolt.style.display = '';
    title.textContent = 'Lightning Log';
    sub.textContent = 'F-150 Lightning · Charging';
  } else if (currentView === 'new-trip') {
    back.style.display = '';
    bolt.style.display = 'none';
    title.textContent = 'New Trip';
    sub.textContent = '';
  } else {
    const trip = getTrip(currentTripId);
    back.style.display = '';
    bolt.style.display = 'none';
    title.textContent = trip ? trip.name : 'Trip';
    sub.textContent = trip && trip.date ? formatDate(trip.date) : '';
  }
}

// ── Nav / view switching ────────────────────────────────────────────────────────
function switchView(view) {
  // Leaving the add/edit form without saving cancels any in-progress edit
  if (view !== 'add-stop' && currentView === 'add-stop') editingStopId = null;

  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  currentView = view;
  document.getElementById('view-' + view).classList.add('active');

  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (view === 'trips' || view === 'trip-detail') document.querySelector('[data-view="trips"]').classList.add('active');
  if (view === 'add-stop' || view === 'new-trip') document.getElementById('nav-primary').classList.add('active');

  // Context-aware primary button. On the trips list (and the New Trip form) it
  // represents "New Trip"; inside a trip (or the Add Stop form) it's "Add Stop".
  const primaryLabel = document.getElementById('nav-primary-label');
  const primaryIcon = document.getElementById('nav-primary-icon');
  const primaryBtn = document.getElementById('nav-primary');
  const tripContext = view === 'trips' || view === 'new-trip';
  if (tripContext) {
    primaryLabel.textContent = 'New Trip';
    primaryIcon.textContent = '＋';
    primaryBtn.disabled = false;
  } else {
    primaryLabel.textContent = 'Add Stop';
    primaryIcon.textContent = '⚡';
    primaryBtn.disabled = !currentTripId;
  }

  document.getElementById('body').scrollTop = 0;
  updateHeader();

  if (view === 'trips') renderTripList();
  if (view === 'trip-detail') renderTripDetail();
  if (view === 'add-stop') renderAddStop();
}

document.getElementById('nav').addEventListener('click', e => {
  const btn = e.target.closest('[data-view]');
  if (!btn || btn.disabled) return;
  const v = btn.dataset.view;
  if (v === 'trips') { switchView('trips'); return; }
  if (v === 'primary') {
    // In a trip context the primary action is "New Trip"; inside a trip it adds a stop.
    const tripContext = currentView === 'trips' || currentView === 'new-trip';
    if (tripContext) openNewTrip();
    else if (currentTripId) { editingStopId = null; switchView('add-stop'); }
  }
});

document.getElementById('header-back').addEventListener('click', () => {
  switchView('trips');
});

// ── Render: Trip List ────────────────────────────────────────────────────────
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str == null ? '' : String(str);
  return div.innerHTML;
}

function renderTripList() {
  const list = document.getElementById('trip-list');
  if (!trips.length) {
    list.innerHTML = '<div class="empty">No trips yet.<br>Tap <b>+ New Trip</b> to start one.</div>';
    return;
  }

  list.innerHTML = [...trips].slice().reverse().map(trip => {
    const ts = tripStats(trip);
    const lastStop = trip.stops.length ? trip.stops[trip.stops.length - 1].location : null;
    return `
      <div class="trip-card" data-trip="${trip.id}">
        <div class="trip-card-top">
          <div>
            <div class="trip-name">${escapeHtml(trip.name || 'Untitled Trip')}</div>
            <div class="trip-date">${trip.date ? formatDate(trip.date) : 'No date set'}</div>
            <div class="trip-route">
              <b>${escapeHtml(trip.startLocation || 'Start')}</b>${lastStop ? ` → <b>${escapeHtml(lastStop)}</b>` : ''}
            </div>
          </div>
          <div class="trip-stop-count">${trip.stops.length} stop${trip.stops.length === 1 ? '' : 's'}</div>
        </div>
        <div class="trip-mini-stats">
          <div class="trip-mini-stat"><div class="trip-mini-val" style="color:#f0b429">${fc(ts.totalCost)}</div><div class="trip-mini-label">Total Cost</div></div>
          <div class="trip-mini-stat"><div class="trip-mini-val" style="color:#00e5ff">${f1(ts.totalKwh)}</div><div class="trip-mini-label">kWh</div></div>
          <div class="trip-mini-stat"><div class="trip-mini-val" style="color:#f97316">${f0(ts.totalMiles)}</div><div class="trip-mini-label">Miles</div></div>
        </div>
      </div>
    `;
  }).join('');
}

document.getElementById('trip-list').addEventListener('click', e => {
  const card = e.target.closest('[data-trip]');
  if (!card) return;
  currentTripId = parseInt(card.dataset.trip);
  expandedStopId = null;
  powerFilter = 'combined';
  switchView('trip-detail');
});

// ── New Trip ─────────────────────────────────────────────────────────────────
function openNewTrip() {
  document.getElementById('t-name').value = '';
  document.getElementById('t-date').value = new Date().toISOString().slice(0, 10);
  document.getElementById('t-start-loc').value = '';
  document.getElementById('t-start-soc').value = '100';
  switchView('new-trip');
}

document.getElementById('create-trip-btn').addEventListener('click', () => {
  const name = document.getElementById('t-name').value.trim();
  const date = document.getElementById('t-date').value;
  const startLoc = document.getElementById('t-start-loc').value.trim();
  const startSoc = parseFloat(document.getElementById('t-start-soc').value);

  if (!name) { showToast('Enter a trip name'); return; }

  const newId = trips.length ? Math.max(...trips.map(t => t.id)) + 1 : 1;
  const trip = {
    id: newId,
    name,
    date,
    startLocation: startLoc || 'Start',
    startSoc: clampPct(startSoc),
    stops: [],
    homeCharge: null,
  };
  trips.push(trip);
  saveTrips();
  currentTripId = newId;
  showToast('Trip created ✓');
  switchView('trip-detail');
});

// ── Home Charge ──────────────────────────────────────────────────────────────
function lastDepartSoc(trip) {
  if (!trip.stops.length) return trip.startSoc;
  for (let i = trip.stops.length - 1; i >= 0; i--) {
    if (trip.stops[i].battDepart != null) return trip.stops[i].battDepart;
  }
  return trip.startSoc;
}

// Pure calculation from explicit inputs; returns figures or null if incomplete.
// startSoc/targetSoc define the charge window (e.g. 23% → 80%). milesHome is
// optional and used only for the descriptive note.
function computeHomeCharge(trip, startSoc, targetSoc, milesHome, rate, chargerKw) {
  if (startSoc == null || isNaN(startSoc)) return null;
  const target = (targetSoc == null || isNaN(targetSoc)) ? 100 : targetSoc;
  const startC = Math.min(100, Math.max(0, startSoc));
  const targetC = Math.min(100, Math.max(0, target));
  if (targetC <= startC) return null;

  const socNeeded = targetC - startC;
  const kwhNeeded = (socNeeded / 100) * BATTERY_CAPACITY_KWH;
  const hasCost = rate != null && !isNaN(rate);
  const cost = hasCost ? kwhNeeded * rate : 0;
  const timeHrs = (chargerKw != null && !isNaN(chargerKw) && chargerKw > 0) ? kwhNeeded / chargerKw : null;
  const minutes = timeHrs != null ? Math.round(timeHrs * 60) : 0;
  const hasMiles = milesHome != null && !isNaN(milesHome);

  return { startSoc: startC, targetSoc: targetC, kwhNeeded, cost, minutes,
           milesHome: hasMiles ? milesHome : null, hasMiles, hasCost, timeHrs, chargerKw };
}

// Live preview shown inside the Add Charging Stop form when in Home Charge mode.
function renderHomePreview() {
  const trip = getTrip(currentTripId);
  const box = document.getElementById('home-preview');
  if (!trip) { box.innerHTML = ''; return; }

  const bs = parseFloat(document.getElementById('h-batt-start').value);
  const bt = parseFloat(document.getElementById('h-batt-target').value);
  const m = parseFloat(document.getElementById('h-miles').value);
  const r = parseFloat(document.getElementById('h-rate').value);
  const ck = parseFloat(document.getElementById('h-charger-kw').value);
  const p = computeHomeCharge(trip, isNaN(bs) ? null : bs, isNaN(bt) ? null : bt,
                              isNaN(m) ? null : m, isNaN(r) ? null : r, isNaN(ck) ? null : ck);

  if (!p) { box.innerHTML = ''; return; }

  box.innerHTML = `
    <div class="home-result-grid">
      <div class="home-result-item"><div class="home-result-val" style="color:#f0b429">${f0(p.startSoc)}→${f0(p.targetSoc)}%</div><div class="home-result-label">Charge</div></div>
      <div class="home-result-item"><div class="home-result-val" style="color:#00e5ff">${f1(p.kwhNeeded)}</div><div class="home-result-label">kWh added</div></div>
      <div class="home-result-item"><div class="home-result-val" style="color:#a78bfa">${p.hasCost ? fc(p.cost) : '—'}</div><div class="home-result-label">Est. Cost</div></div>
    </div>
    ${p.timeHrs != null ? `<div class="home-note">≈ ${p.timeHrs < 1 ? f0(p.timeHrs * 60) + ' min' : f1(p.timeHrs) + ' hrs'} on a ${f1(p.chargerKw)} kW Level 2 charger.</div>` : ''}
    <div class="home-note">Charging from ${f0(p.startSoc)}% to ${f0(p.targetSoc)}% adds ${f1(p.kwhNeeded)} kWh${p.hasMiles ? ` · ${f0(p.milesHome)} mi driven to destination` : ''}.</div>
  `;
}

let stopPower = 'dc';    // 'dc' | 'ac' for the standard stop form
let editingStopId = null; // when set, the Add Stop form is editing an existing stop

// Show the right field group + button label + hint for the current mode
function applyLegMode() {
  const isHome = legType === 'home';
  const editing = editingStopId != null;
  document.getElementById('standard-fields').style.display = isHome ? 'none' : '';
  document.getElementById('home-fields').style.display = isHome ? '' : 'none';
  document.getElementById('add-stop-btn').textContent = editing
    ? (isHome ? '🏁 Save Destination Charge' : '💾 Save Changes')
    : (isHome ? '🏁 Add Destination Charge' : '⚡ Add Charging Stop');
  updateAddStopHint();
  if (isHome) {
    // Convenience: prefill start battery with the last logged departure %
    const trip = getTrip(currentTripId);
    const startField = document.getElementById('h-batt-start');
    if (trip && startField && !startField.value) {
      const lastSoc = lastDepartSoc(trip);
      if (lastSoc != null) startField.value = f0(lastSoc);
    }
    renderHomePreview();
  }
}

function updateAddStopHint() {
  const trip = getTrip(currentTripId);
  if (!trip) return;
  const index = trip.stops.length;
  const prevSoc = priorSoc(trip, index);
  const prevLoc = index === 0 ? trip.startLocation : trip.stops[index - 1].location;
  const hint = document.getElementById('prev-soc-hint');

  const milesFieldLabel = document.getElementById('s-miles-field-label');
  if (milesFieldLabel) {
    milesFieldLabel.textContent = legType === 'first' ? 'Miles from Start' : 'Miles Since Last Stop';
  }

  if (legType === 'home') {
    const lastSoc = lastDepartSoc(trip);
    const lastLoc = trip.stops.length ? trip.stops[trip.stops.length - 1].location : trip.startLocation;
    if (lastSoc != null) {
      hint.innerHTML = `Final leg to destination from <b>${escapeHtml(lastLoc || 'last stop')}</b> at <b>${f0(lastSoc)}%</b>. Enter the battery % you plug in at and your target charge level.`;
    } else {
      hint.innerHTML = `Final leg to destination. Enter the battery % you plug in at and your target charge level.`;
    }
  } else if (legType === 'first') {
    hint.innerHTML = `First charging stop departing <b>${escapeHtml(trip.startLocation || 'start')}</b>${prevSoc != null ? ` at <b>${f0(prevSoc)}%</b>` : ''}. Enter battery % on arrival here to calculate efficiency for this leg.`;
  } else {
    if (prevSoc != null) {
      hint.innerHTML = `Departing <b>${escapeHtml(prevLoc || 'previous stop')}</b> at <b>${f0(prevSoc)}%</b> battery. Enter battery % on arrival here to calculate efficiency for this leg.`;
    } else {
      hint.innerHTML = `Departing <b>${escapeHtml(prevLoc || 'previous stop')}</b>. Enter battery % values to enable efficiency calculations.`;
    }
  }
}

function renderAddStop() {
  const trip = getTrip(currentTripId);
  if (!trip) { switchView('trips'); return; }

  // Clear all fields first
  ['s-loc','s-batt-arrive','s-miles','s-minutes','s-kwh','s-batt-depart','s-cost',
   'h-batt-start','h-batt-target','h-miles','h-rate','h-charger-kw'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('home-preview').innerHTML = '';
  document.getElementById('loc-status').textContent = '';
  document.getElementById('loc-status').classList.remove('error');

  const editing = editingStopId != null ? trip.stops.find(s => s.id === editingStopId) : null;

  if (editing) {
    // ── Edit mode: load the stop's values ──
    if (editing.isHomeCharge) {
      legType = 'home';
      document.getElementById('h-batt-start').value = editing.battArrive != null ? f0(editing.battArrive) : '';
      document.getElementById('h-batt-target').value = editing.battDepart != null ? f0(editing.battDepart) : '';
      if (editing.miles != null) document.getElementById('h-miles').value = editing.miles;
      if (editing.homeRate != null) document.getElementById('h-rate').value = editing.homeRate;
      if (editing.chargerKw != null) document.getElementById('h-charger-kw').value = editing.chargerKw;
    } else {
      const idx = trip.stops.findIndex(s => s.id === editing.id);
      legType = idx === 0 ? 'first' : 'enroute';
      stopPower = editing.power === 'ac' ? 'ac' : 'dc';
      document.getElementById('s-loc').value = editing.location || '';
      if (editing.battArrive != null) document.getElementById('s-batt-arrive').value = f0(editing.battArrive);
      if (editing.miles != null) document.getElementById('s-miles').value = editing.miles;
      document.getElementById('s-minutes').value = editing.minutes;
      document.getElementById('s-kwh').value = editing.kwh;
      if (editing.battDepart != null) document.getElementById('s-batt-depart').value = f0(editing.battDepart);
      document.getElementById('s-cost').value = editing.cost;
    }
  } else {
    // ── Add mode: auto-select leg type based on stop count ──
    legType = trip.stops.length === 0 ? 'first' : 'enroute';
    stopPower = 'dc';
  }

  document.querySelectorAll('.leg-toggle-btn').forEach(b => b.classList.toggle('active', b.dataset.leg === legType));
  document.querySelectorAll('.ac-dc-btn').forEach(b => b.classList.toggle('active', b.dataset.power === stopPower));
  document.querySelector('#view-add-stop .section-head').textContent = editing ? 'Edit Charging Stop' : 'Add Charging Stop';

  applyLegMode();
}

// ── Use-my-location (GPS + Nominatim reverse geocode) ─────────────────────────
function setLocStatus(msg, isError) {
  const el = document.getElementById('loc-status');
  el.textContent = msg || '';
  el.classList.toggle('error', !!isError);
}

// Build a concise label from a Nominatim address object
function labelFromAddress(addr) {
  if (!addr) return null;
  const name = addr.amenity || addr.shop || addr.fuel || addr.building || '';
  const town = addr.city || addr.town || addr.village || addr.hamlet || addr.county || '';
  const state = addr.state_code || addr.state || '';
  const place = [town, state].filter(Boolean).join(', ');
  if (name && place) return `${name} - ${place}`;
  if (place) return place;
  if (name) return name;
  return null;
}

document.getElementById('loc-btn').addEventListener('click', () => {
  const btn = document.getElementById('loc-btn');
  if (!navigator.geolocation) { setLocStatus('Geolocation not supported on this device', true); return; }

  btn.disabled = true;
  setLocStatus('Getting your location…');

  navigator.geolocation.getCurrentPosition(async (pos) => {
    const { latitude, longitude } = pos.coords;
    const coords = `${latitude.toFixed(5)}, ${longitude.toFixed(5)}`;

    // Try reverse geocoding (needs internet). Fall back to raw coordinates.
    try {
      const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${latitude}&lon=${longitude}&zoom=16&addressdetails=1`;
      const resp = await fetch(url, { headers: { 'Accept': 'application/json' } });
      if (!resp.ok) throw new Error('lookup failed');
      const data = await resp.json();
      const label = labelFromAddress(data.address) || data.display_name?.split(',').slice(0, 2).join(',') || coords;
      document.getElementById('s-loc').value = label;
      setLocStatus('Location filled in — edit if needed');
    } catch {
      document.getElementById('s-loc').value = coords;
      setLocStatus('Offline — used GPS coordinates, edit to add a name', true);
    } finally {
      btn.disabled = false;
    }
  }, (err) => {
    btn.disabled = false;
    if (err.code === err.PERMISSION_DENIED) setLocStatus('Location permission denied', true);
    else if (err.code === err.TIMEOUT) setLocStatus('Location request timed out', true);
    else setLocStatus('Could not get location', true);
  }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 });
});

document.getElementById('add-stop-btn').addEventListener('click', () => {
  const trip = getTrip(currentTripId);
  if (!trip) return;

  // ── Destination Charge mode ──
  if (legType === 'home') {
    const bs = parseFloat(document.getElementById('h-batt-start').value);
    const bt = parseFloat(document.getElementById('h-batt-target').value);
    const m = parseFloat(document.getElementById('h-miles').value);
    const r = parseFloat(document.getElementById('h-rate').value);
    const ck = parseFloat(document.getElementById('h-charger-kw').value);

    if (isNaN(bs)) { showToast('Enter battery % at start'); return; }
    if (isNaN(bt)) { showToast('Enter target charge %'); return; }
    if (bt <= bs) { showToast('Target % must be above start %'); return; }

    const p = computeHomeCharge(trip, bs, bt, isNaN(m) ? null : m, isNaN(r) ? null : r, isNaN(ck) ? null : ck);
    if (!p) { showToast('Could not calculate destination charge'); return; }

    const editing = editingStopId != null ? trip.stops.find(s => s.id === editingStopId) : null;
    if (editing) {
      Object.assign(editing, {
        location: 'Destination',
        battArrive: p.startSoc,
        miles: isNaN(m) ? null : m,
        minutes: p.minutes,
        kwh: p.kwhNeeded,
        battDepart: p.targetSoc,
        cost: p.cost,
        isHomeCharge: true,
        power: 'ac',
        homeRate: isNaN(r) ? null : r,
        chargerKw: isNaN(ck) ? null : ck,
      });
      editingStopId = null;
      saveTrips();
      showToast('Destination charge updated ✓');
      switchView('trip-detail');
      return;
    }

    const newId = trip.stops.length ? Math.max(...trip.stops.map(s => s.id)) + 1 : 1;
    trip.stops.push({
      id: newId,
      location: 'Destination',
      battArrive: p.startSoc,
      miles: isNaN(m) ? null : m,
      minutes: p.minutes,
      kwh: p.kwhNeeded,
      battDepart: p.targetSoc,
      cost: p.cost,
      isHomeCharge: true,
      isLastLeg: true,
      power: 'ac',
      homeRate: isNaN(r) ? null : r,
      chargerKw: isNaN(ck) ? null : ck,
    });
    saveTrips();
    showToast('Destination charge added ✓');
    switchView('trip-detail');
    return;
  }

  // ── Standard charging stop ──
  const loc = document.getElementById('s-loc').value.trim();
  const battArrive = parseFloat(document.getElementById('s-batt-arrive').value);
  const miles = parseFloat(document.getElementById('s-miles').value);
  const minutes = parseFloat(document.getElementById('s-minutes').value);
  const kwh = parseFloat(document.getElementById('s-kwh').value);
  const battDepart = parseFloat(document.getElementById('s-batt-depart').value);
  const cost = parseFloat(document.getElementById('s-cost').value);

  if (isNaN(minutes) || isNaN(kwh) || isNaN(cost)) {
    showToast('Fill in time, kWh, and cost'); return;
  }

  const battArriveC = clampPct(battArrive);
  const battDepartC = clampPct(battDepart);
  if (battArriveC != null && battDepartC != null && battDepartC < battArriveC) {
    showToast('Departure % should be ≥ arrival %'); return;
  }

  const editingStd = editingStopId != null ? trip.stops.find(s => s.id === editingStopId) : null;
  if (editingStd) {
    Object.assign(editingStd, {
      location: loc || editingStd.location,
      battArrive: battArriveC,
      miles: isNaN(miles) ? null : miles,
      minutes, kwh,
      battDepart: battDepartC,
      cost,
      isHomeCharge: false,
      power: stopPower,
    });
    editingStopId = null;
    saveTrips();
    showToast('Stop updated ✓');
    switchView('trip-detail');
    return;
  }

  const newId = trip.stops.length ? Math.max(...trip.stops.map(s => s.id)) + 1 : 1;
  trip.stops.push({
    id: newId,
    location: loc || `Stop ${trip.stops.length + 1}`,
    battArrive: battArriveC,
    miles: isNaN(miles) ? null : miles,
    minutes, kwh,
    battDepart: battDepartC,
    cost,
    isHomeCharge: false,
    isLastLeg: false,
    power: stopPower,
  });
  saveTrips();
  showToast('Stop added ✓');
  switchView('trip-detail');
});

// ── Print ────────────────────────────────────────────────────────────────────
// ── Share / Export as PDF ─────────────────────────────────────────────────────
// Builds a trip PDF with jsPDF and hands it to the iOS share sheet (Messages,
// Mail, Print, AirDrop, Save to Files…). Falls back to window.print() if the
// PDF library or Web Share API with files isn't available.
function buildTripPdf(trip) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'pt', format: 'letter' });
  const pageW = doc.internal.pageSize.getWidth();
  const margin = 40;
  let y = margin;

  const ts = tripStats(trip);

  // Header
  doc.setFont('helvetica', 'bold'); doc.setFontSize(18);
  doc.text(trip.name || 'Trip', margin, y);
  y += 16;
  doc.setFont('helvetica', 'normal'); doc.setFontSize(10); doc.setTextColor(120);
  const sub = [trip.date ? formatDate(trip.date) : '', `Generated ${new Date().toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' })}`].filter(Boolean).join('  ·  ');
  doc.text(sub, margin, y);
  y += 8;
  doc.setDrawColor(0); doc.setLineWidth(1.2);
  doc.line(margin, y, pageW - margin, y);
  y += 18;

  // Summary stats (two rows of four)
  const stats = [
    ['Total kWh', f1(ts.totalKwh)], ['Total Spent', fc(ts.totalCost)],
    ['Avg Speed', f1(ts.avgSpeed) + ' kW'], ['Cost/kWh', fc(ts.costPerKwh)],
    ['Total Miles', f0(ts.totalMiles) + ' mi'], ['Cost/Mile', fc(ts.costPerMile)],
    ['mi/kWh', f2(ts.avgMiPkwh)], ['Wh/Mile', f0(ts.avgWhPmi)],
  ];
  doc.setFontSize(9);
  const colW = (pageW - margin * 2) / 4;
  stats.forEach((s, i) => {
    const col = i % 4, row = Math.floor(i / 4);
    const x = margin + col * colW;
    const yy = y + row * 34;
    doc.setTextColor(130); doc.setFont('helvetica', 'normal');
    doc.text(s[0], x, yy);
    doc.setTextColor(0); doc.setFont('helvetica', 'bold'); doc.setFontSize(12);
    doc.text(String(s[1]), x, yy + 14);
    doc.setFontSize(9);
  });
  y += 34 * 2 + 10;

  // Start
  doc.setDrawColor(200); doc.setLineWidth(0.5);
  doc.setFont('helvetica', 'bold'); doc.setFontSize(11); doc.setTextColor(0);
  doc.text('Route', margin, y); y += 6;
  doc.line(margin, y, pageW - margin, y); y += 16;

  doc.setFontSize(10);
  doc.text(`Start: ${trip.startLocation || 'Start'}`, margin, y);
  doc.setFont('helvetica', 'normal'); doc.setTextColor(120);
  if (trip.startSoc != null) doc.text(`${f0(trip.startSoc)}%`, pageW - margin, y, { align: 'right' });
  y += 18;

  // Stops
  trip.stops.forEach((stop, i) => {
    const ss = stopStats(trip, i);
    if (y > 720) { doc.addPage(); y = margin; }

    doc.setFont('helvetica', 'bold'); doc.setFontSize(11); doc.setTextColor(0);
    doc.text(`${stop.isHomeCharge ? 'Destination' : '#' + (i + 1)}  ${stop.location || ''}`, margin, y);
    doc.setFont('helvetica', 'normal'); doc.setFontSize(9); doc.setTextColor(120);
    doc.text(`${f1(stop.kwh)} kWh · ${fc(stop.cost)} · ${stop.minutes} min · ${f0(ss.speed)} kW`, margin, y + 13);

    const milesTxt = stop.miles != null ? f0(stop.miles) + ' mi' : '~' + f0(stop.kwh * MILES_PER_KWH) + ' mi';
    const battTxt = `${stop.battArrive != null ? f0(stop.battArrive) + '%' : '—'}→${stop.battDepart != null ? f0(stop.battDepart) + '%' : '—'}`;
    const effTxt = ss.miPkwh != null ? `${f2(ss.miPkwh)} mi/kWh` : '';
    doc.text([milesTxt, battTxt, `${fc(ss.cpk)}/kWh`, effTxt].filter(Boolean).join('   ·   '), pageW - margin, y, { align: 'right' });

    y += 26;
    doc.setDrawColor(235); doc.line(margin, y - 6, pageW - margin, y - 6);
  });

  return doc;
}

async function shareTrip() {
  if (!currentTripId) { showToast('Open a trip to share'); return; }
  const trip = getTrip(currentTripId);
  if (!trip) { showToast('Open a trip to share'); return; }

  // Fall back to the print sheet if jsPDF didn't load (e.g. offline first run)
  if (!window.jspdf || !window.jspdf.jsPDF) {
    showToast('Opening print view…');
    legacyPrint();
    return;
  }

  let doc;
  try {
    doc = buildTripPdf(trip);
  } catch (e) {
    showToast('Could not build PDF — printing instead');
    legacyPrint();
    return;
  }

  const safeName = (trip.name || 'trip').replace(/[^a-z0-9]+/gi, '-').toLowerCase();
  const fileName = `lightning-log-${safeName}.pdf`;
  const blob = doc.output('blob');
  const file = new File([blob], fileName, { type: 'application/pdf' });

  // Preferred path: native share sheet with the PDF file
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file], title: trip.name || 'Trip', text: `${trip.name || 'Trip'} — Lightning Log` });
      return;
    } catch (e) {
      if (e && e.name === 'AbortError') return; // user cancelled
    }
  }

  // Fallback: download the PDF so the user can text/email/print it manually
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = fileName;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 5000);
  showToast('PDF downloaded');
}

// Original print-sheet flow, kept as a fallback
function legacyPrint() {
  document.getElementById('print-timestamp').textContent =
    'Printed ' + new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

  const finish = () => {
    document.querySelectorAll('.stop-detail').forEach(el => { el.classList.add('open'); el.style.display = 'block'; });
    window.print();
    setTimeout(() => {
      document.querySelectorAll('.stop-detail').forEach(el => { el.style.display = ''; });
      renderTripDetail();
    }, 300);
  };

  if (currentView !== 'trip-detail') {
    expandedStopId = null;
    switchView('trip-detail');
    setTimeout(finish, 50);
  } else {
    finish();
  }
}

document.getElementById('print-nav-btn').addEventListener('click', shareTrip);

// ── Init ──────────────────────────────────────────────────────────────────────
document.getElementById('rev-tag').textContent = APP_REVISION;
switchView('trips');
</script>
